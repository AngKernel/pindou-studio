name: CI

on:
  push:
    branches: [main, 'phase-*']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --audit=false

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Fixed fixture provenance and hashes
        run: npm run fixtures:check

      - name: Upload phase 1 regression report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-1-regression-report
          path: test-results/phase1-regression.json
          if-no-files-found: warn

      - name: Third-party license inventory
        run: npm run licenses:check

      - name: Known vulnerability policy
        run: npm run security:check

      - name: Online production dependency audit
        run: npm run audit:prod:online

      - name: Build
        run: npm run build

  browser:
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --audit=false

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Browser integration tests
        run: npm run test:e2e
